<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PicoClaw</title>
<style>
:root {
  --bg: #09090b; --card: #18181b; --border: #27272a;
  --text: #fafafa; --text2: #a1a1aa; --muted: #27272a;
  --user-bubble: #8b5cf6; --accent: #a78bfa;
  --green: #22c55e; --red: #ef4444;
  --radius: 12px; --font: system-ui, -apple-system, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

#header{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
#header .dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0}
#header .dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
#header .title{font-size:13px;color:var(--text2);font-weight:500}
#header .spacer{flex:1}
#header button{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .15s;font-family:var(--font)}
#header button:hover{border-color:var(--accent);color:var(--text)}

#msgList{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px}
#msgList .empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;opacity:.6}

.msg-row.user{align-self:flex-end;max-width:80%}
.msg-row.user .bubble{background:var(--user-bubble);color:#fff;border-radius:var(--radius) var(--radius) 2px var(--radius);padding:10px 16px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg-row.user .time{font-size:10px;color:var(--text2);text-align:right;margin-top:4px}

.msg-row.assistant{align-self:flex-start;width:100%}
.msg-row.assistant .head{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:11px;color:var(--text2)}
.msg-row.assistant .head .name{color:var(--accent);font-weight:500}
.msg-row.assistant .bubble{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg-row.assistant .bubble strong{color:var(--accent)}
.msg-row.assistant .bubble code{background:var(--muted);padding:2px 6px;border-radius:4px;font-size:12px}
.msg-row.assistant .bubble pre{background:var(--muted);padding:12px;border-radius:8px;overflow-x:auto;font-size:12px;margin:8px 0;white-space:pre-wrap}
.msg-row.assistant .bubble pre code{background:none;padding:0}

.typing-row{align-self:flex-start;display:flex;gap:8px;align-items:center;padding:10px 16px;color:var(--text2);font-size:13px}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce .8s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}

#inputBar{display:flex;gap:8px;padding:12px 20px;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;align-items:flex-end}
#inputBar textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:14px;outline:none;resize:none;min-height:42px;max-height:120px;font-family:var(--font);line-height:1.4}
#inputBar textarea:focus{border-color:var(--accent)}
#inputBar textarea:disabled{opacity:.3}
#inputBar button{padding:10px 20px;border-radius:var(--radius);border:none;background:var(--accent);color:#09090b;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);white-space:nowrap}
#inputBar button:hover{opacity:.9}
#inputBar button:disabled{opacity:.3;cursor:default}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);padding:10px 24px;border-radius:24px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="header">
  <span class="dot" id="statusDot"></span>
  <span class="title">PicoClaw</span>
  <span class="spacer"></span>
  <button onclick="newSession()">+ 新对话</button>
</div>

<div id="msgList"><div class="empty">发送消息开始对话</div></div>

<div class="typing-row" id="typing" style="display:none">
  <div class="typing-dots"><span></span><span></span><span></span></div>
  思考中...
</div>

<div id="inputBar">
  <textarea id="msgInput" placeholder="输入消息..." rows="1" disabled></textarea>
  <button id="sendBtn" disabled onclick="send()">发送</button>
</div>

<div id="toast"></div>

<script>
let messages = [];
let sendCounter = 0;
let ws = null, reconnectTimer = null;

const WS_URL = 'ws://10.0.0.1:18790/pico/ws';
const TOKEN = 'picoclaw-router-2026';
const HIST_KEY = 'pico-history';

// ===== WebSocket =====
function connect() {
  if (ws) try { ws.close(); } catch(e) {}
  try {
    ws = new WebSocket(WS_URL, 'token.' + TOKEN);
    ws.onopen = function() {
      setConnected(true);
      setInputEnabled(true);
    };
    ws.onmessage = function(e) {
      try { handleMessage(JSON.parse(e.data)); } catch(_) {}
    };
    ws.onclose = function() {
      setConnected(false);
      setInputEnabled(false);
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 5000);
    };
    ws.onerror = function() { ws.close(); };
  } catch(e) {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 5000);
  }
}

function setConnected(on) {
  document.getElementById('statusDot').className = 'dot' + (on ? ' ok' : '');
}
function setInputEnabled(on) {
  document.getElementById('msgInput').disabled = !on;
  document.getElementById('sendBtn').disabled = !on;
}

// ===== Messages =====
function handleMessage(msg) {
  switch (msg.type) {
    case 'message.create': addOrUpdateBot(msg, false); break;
    case 'message.update': addOrUpdateBot(msg, true); break;
    case 'message.stream': handleStream(msg); break;
    case 'message.stream_end': handleStreamEnd(msg); break;
    case 'message.delete': removeMsg(msg.payload && msg.payload.message_id || msg.id); break;
    case 'error': showToast('❌ ' + ((msg.payload && msg.payload.message) || '错误')); stopTyping(); break;
    case 'typing.start': startTyping(); break;
    case 'typing.stop': stopTyping(); break;
    case 'pong': break;
  }
}

function addOrUpdateBot(msg, isUpdate) {
  var payload = msg.payload || {};
  var mid = payload.message_id || msg.id;
  var content = payload.content || '';
  var kind = payload.kind || 'normal';
  if (kind === 'thought' || kind === 'tool_calls') return;
  if (msg.type === 'message.stream' || payload.stream) return;
  if (!content && !isUpdate) return;
  var ts = new Date(msg.timestamp || Date.now()).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

  if (isUpdate) {
    var ex = findMsg(mid);
    if (ex) { ex.content = content; } else {
      messages.push({ id: mid, role: 'assistant', content: content, time: ts });
    }
    if (!payload.placeholder) stopTyping();
  } else {
    var idx = messages.findIndex(function(m) { return m.id === mid; });
    var obj = { id: mid, role: 'assistant', content: content, time: ts };
    if (idx >= 0) messages[idx] = obj; else messages.push(obj);
    if (!payload.placeholder) stopTyping();
  }
  saveHistory();
  renderMessages();
}

function findMsg(id) { return messages.find(function(m) { return m.id === id; }); }
function removeMsg(id) { messages = messages.filter(function(m) { return m.id !== id; }); renderMessages(); }

function startTyping() { document.getElementById('typing').style.display = 'flex'; scrollBottom(); }
function stopTyping() { document.getElementById('typing').style.display = 'none'; }

function renderMessages() {
  var c = document.getElementById('msgList');
  if (!messages.length) { c.innerHTML = '<div class="empty">发送消息开始对话</div>'; return; }
  c.innerHTML = messages.map(function(m) {
    if (m.role === 'user') {
      return '<div class="msg-row user"><div class="bubble">' + escHtml(m.content) + '</div><div class="time">' + (m.time || '') + '</div></div>';
    }
    return '<div class="msg-row assistant"><div class="head"><span class="name">PicoClaw</span><span>' + (m.time || '') + '</span></div><div class="bubble">' + renderMd(m.content) + '</div></div>';
  }).join('');
  scrollBottom();
}

function renderMd(text) {
  if (!text) return '';
  return escHtml(text)
    .replace(/`(\w*)\n([\s\S]*?)`/g, '<pre><code></code></pre>')
    .replace(/([^]+)/g, '<code></code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong></strong>')
    .replace(/^### (.+)$/gm, '<h3></h3>')
    .replace(/^## (.+)$/gm, '<h2></h2>')
    .replace(/^# (.+)$/gm, '<h1></h1>')
    .replace(/^&gt; (.+)$/gm, '<blockquote></blockquote>')
    .replace(/\n/g, '<br>');
}

function handleStream(msg) {
  var id = msg.id;
  var payload = msg.payload || {};
  var content = payload.content || '';
  if (!id || !content) return;
  var ex = findMsg(id);
  if (ex) { ex.content = (ex.content || '') + content; }
  else { messages.push({ id: id, role: 'assistant', content: content, time: '' }); }
  renderMessages();
}

function handleStreamEnd(msg) {
  var id = msg.id;
  if (!id) return;
  stopTyping();
  renderMessages();
}

function scrollBottom() {
  requestAnimationFrame(function() {
    document.getElementById('msgList').scrollTop = document.getElementById('msgList').scrollHeight;
  });
}

// ===== Send =====
function send() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  var ts = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  var id = 'msg-' + (++sendCounter) + '-' + Date.now();
  messages.push({ id: id + '-user', role: 'user', content: text, time: ts });
  ws.send(JSON.stringify({ type: 'message.send', id: id, payload: { content: text } }));
  saveHistory();
  renderMessages();
  input.value = ''; input.style.height = 'auto';
}

function newSession() {
  showToast('🧹 清空...');
  messages = [];
  try { localStorage.setItem(HIST_KEY, '[]'); } catch(e) {}
  try {
    fetch("http://10.0.0.1:18790/character/clear?name=PicoClaw", {
      method: "POST", body: "I am PicoClaw, a helpful AI assistant.",
      headers: { "Content-Type": "text/plain; charset=utf-8" }
    });
  } catch(e) {}
  renderMessages();
  showToast('✅ 已清空');
}

// ===== Utils =====
function escHtml(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', function() {
  connect();
  try {
    var raw = localStorage.getItem(HIST_KEY);
    if (raw) { messages = JSON.parse(raw); renderMessages(); }
  } catch(e) {}

  document.getElementById('msgInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  document.getElementById('msgInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  window.addEventListener('beforeunload', function() { saveHistory(); });
});

function saveHistory() {
  if (!messages.length) return;
  try { localStorage.setItem(HIST_KEY, JSON.stringify(messages)); } catch(e) {}
}
</script>
</body>
</html>
