<%+header%>
<%
local bridge = require "picoclaw_bridge"
local running = bridge.is_running()
local gw_url = bridge.gateway_base()
%>

<style>
.pc-chat-wrap{position:fixed;inset:0;padding:0;margin:0;overflow:hidden;z-index:1}
.pc-frame{width:100%;height:100%;border:none;background:#0a0a0f}
.pc-stopped{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0a0a0f;padding:40px 20px;text-align:center;z-index:2}
.pc-stopped .icon{font-size:52px;opacity:.4}
.pc-stopped .msg{font-size:14px;color:#889}
</style>

<div class="pc-chat-wrap">
  <iframe class="pc-frame" id="chatFrame" src="<%=gw_url%>/?embed=1" style="<%if not running then%>display:none<%end%>"></iframe>

  <div class="pc-stopped" id="stoppedMsg" style="<%if running then%>display:none<%end%>">
    <div class="icon">🦞</div>
    <div class="msg">PicoClaw 当前未运行</div>
    <a class="cbi-button cbi-button-action important" href="<%=luci.dispatcher.build_url("admin","services","picoclaw","start")%>">启动服务</a>
  </div>
</div>

<script type="text/javascript">//<![CDATA[
XHR.poll(5, '<%=url("admin/services/picoclaw/status_data")%>', null,
  function(x, data) {
    if (!data) return;
    var frame = document.getElementById('chatFrame');
    var stopped = document.getElementById('stoppedMsg');
    var isRunning = data.running;
    var wasRunning = frame.style.display !== 'none';

    if (wasRunning !== isRunning) {
      if (isRunning) {
        frame.style.display = '';
        stopped.style.display = 'none';
        frame.src = frame.src.replace(/#.*$/, '') + '#' + Date.now();
      } else {
        frame.style.display = 'none';
        stopped.style.display = '';
      }
    }
  }
);
//]]></script>

<%+footer%>
